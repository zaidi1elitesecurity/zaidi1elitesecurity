<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Careers - Z1 Elite Security</title>

  <style>
    body{
      margin:0;
      font-family: Arial;
      background:#0a0a0a;
      color:white;
      text-align:center;
    }

    header{
      padding:20px;
      background:black;
      font-size:24px;
    }

    .section{
      padding:50px 20px;
    }

    input, textarea{
      width:80%;
      padding:10px;
      margin:8px;
      border-radius:5px;
      border:none;
    }

    button{
      padding:12px 20px;
      background:gold;
      border:none;
      font-weight:bold;
      cursor:pointer;
    }
  </style>
</head>

<body>

<header>
  Careers - Z1 Elite Security Services
</header>

<div class="section">
  <h2>Join Our Team</h2>

  <p>Apply now and become part of our professional security team.</p>

  <form>
    <input type="text" placeholder="Full Name"><br>
    <input type="email" placeholder="Email"><br>
    <input type="text" placeholder="Phone Number"><br>
    
    <p>Upload Your CV:</p>
    <input type="file"><br><br>

    <textarea placeholder="Experience / Message"></textarea><br>

    <button type="submit">Apply Now</button>
  </form>

  <p>Email your CV directly: z1elitesecurity@gmail.com</p>
</div>

</body>
</html>
