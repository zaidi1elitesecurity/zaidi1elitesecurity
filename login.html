<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Login - Z1 Elite Security</title>

  <style>
    body{
      margin:0;
      font-family: Arial;
      background:#0a0a0a;
      color:white;
      text-align:center;
    }

    header{
      padding:20px;
      background:black;
      font-size:24px;
    }

    .container{
      padding:40px 20px;
    }

    .box{
      background:#151515;
      padding:20px;
      margin:20px auto;
      width:80%;
      max-width:400px;
      border-radius:10px;
    }

    input{
      width:90%;
      padding:10px;
      margin:8px;
      border:none;
      border-radius:5px;
    }

    button{
      padding:12px 20px;
      background:gold;
      border:none;
      font-weight:bold;
      cursor:pointer;
      border-radius:6px;
    }
  </style>
</head>

<body>

<header>
  Login / Signup - Z1 Elite Security
</header>

<div class="container">

  <!-- LOGIN -->
  <div class="box">
    <h2>Login</h2>

    <form>
      <input type="email" placeholder="Email"><br>
      <input type="password" placeholder="Password"><br>

      <button type="submit">Login</button>
    </form>
  </div>

  <!-- SIGNUP -->
  <div class="box">
    <h2>Create Account</h2>

    <form>
      <input type="text" placeholder="Full Name"><br>
      <input type="email" placeholder="Email"><br>
      <input type="password" placeholder="Password"><br>

      <button type="submit">Sign Up</button>
    </form>
  </div>

</div>

</body>
</html>
